[build]
  command = "mkdir -p _deploy && cp kpi-dashboard.html _deploy/index.html && cp sw.js manifest.json _deploy/ && cp -r icons _deploy/ && mkdir -p _deploy/supabase && cp supabase/kpi-data.js _deploy/supabase/"
  publish = "_deploy"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; img-src 'self' https: data:; font-src 'self' https: data:;"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
